<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lyrics Bot</title>
    <style>
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0f0f12;
        color: #e6e6e6;
        display: flex;
        min-height: 100vh;
        margin: 0;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .card {
        max-width: 420px;
        padding: 2rem;
      }
      h1 {
        font-size: 1.6rem;
        margin-bottom: 0.5rem;
      }
      code {
        background: #1e1e24;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        color: #ffd479;
      }
      a {
        color: #6ea8fe;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🎵 Lyrics Bot</h1>
      <p>Telegram bot tìm lời bài hát từ Genius đang chạy.</p>
      <p>
        Webhook endpoint: <code>/api/bot</code><br />
        Mở Telegram và gõ <code>/lyric &lt;tên bài hát&gt;</code>.
      </p>
    </div>
  </body>
</html>
